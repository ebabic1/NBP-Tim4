spring:
  datasource:
    url: jdbc:oracle:thin:@ora-02.db.lab.etf.unsa.ba:1521:ETFDB
    username: NBPT4
    password: nbpt4
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    schemas: NBPT4
    default-schema: NBPT4
    baseline-on-migrate: true
    table: nbp_flyway_history
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: nbp-travel-jwt-secret-key-for-development-only-change-in-production
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
